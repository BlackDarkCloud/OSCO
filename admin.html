<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSCO Staff</title>
    <link rel="icon" href="assets/osco-logo-mark.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="config.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="admin">
    <main class="admin-page">
      <section class="admin-login" id="adminLogin">
        <img class="admin-logo" src="assets/osco-logo-full.jpeg" alt="OSCO Power From Beyond" />
        <p class="eyebrow">Private access</p>
        <h1>Staff login</h1>
        <form id="adminAuthForm" class="admin-form compact-form">
          <label>Email <input id="adminEmail" type="email" autocomplete="email" required /></label>
          <label>Password <input id="adminPassword" type="password" autocomplete="current-password" required /></label>
          <button type="submit">Open console</button>
          <p class="helper" id="adminAccessMessage"></p>
        </form>
        <a class="secondary-link" href="/">Back to shop</a>
      </section>

      <section class="admin-console hidden" id="adminConsole">
        <div class="admin-topline">
          <div>
            <p class="eyebrow">Staff console</p>
            <h2>Catalog, content, promos and orders</h2>
          </div>
          <div class="form-actions">
            <a class="secondary-link" href="/">Shop</a>
            <button id="adminLock" type="button">Sign out</button>
          </div>
        </div>

        <div class="admin-tabs" role="tablist" aria-label="Admin sections">
          <button class="active" data-admin-tab="products" type="button">Products</button>
          <button data-admin-tab="gallery" type="button">Gallery</button>
          <button data-admin-tab="promos" type="button">Promo Codes</button>
          <button data-admin-tab="banners" type="button">Banners</button>
          <button data-admin-tab="orders" type="button">Orders</button>
          <button data-admin-tab="staff" type="button">Staff</button>
        </div>

        <div class="admin-panel" data-panel="products">
          <form id="productForm" class="admin-form">
            <input type="hidden" id="productId" />
            <label>Product name <input id="productName" required /></label>
            <label>Price (GHS) <input id="productPrice" type="number" min="1" required /></label>
            <label>Section
              <select id="productSection">
                <option value="new-arrivals">Current Drops</option>
                <option value="flash-sale">Flashsale</option>
                <option value="trending">Trending</option>
              </select>
            </label>
            <label>Sizes <input id="productSizes" placeholder="S, M, L, XL" /></label>
            <label>Product image <input id="productImageFile" type="file" accept="image/png,image/jpeg,image/webp" /></label>
            <label>Image URL <input id="productImage" placeholder="Optional hosted image URL" /></label>
            <div class="image-preview hidden" id="productImagePreview"><img src="" alt="" /></div>
            <div class="form-grid">
              <label>Discount % <input id="productDiscountPercent" type="number" min="0" max="95" value="0" /></label>
              <label>Sort order <input id="productSort" type="number" value="0" /></label>
            </div>
            <label>Description <textarea id="productDescription" rows="3"></textarea></label>
            <div class="check-stack">
              <label class="check-row"><input id="productActive" type="checkbox" checked /> Active</label>
              <label class="check-row"><input id="productDiscountActive" type="checkbox" /> Activate discount</label>
            </div>
            <button type="submit">Save product</button>
            <button class="ghost-button" id="productReset" type="button">Clear</button>
          </form>
          <div class="admin-list" id="adminProductList"></div>
        </div>

        <div class="admin-panel hidden" data-panel="gallery">
          <form id="galleryForm" class="admin-form compact-form">
            <input type="hidden" id="galleryId" />
            <label>Title <input id="galleryTitle" required /></label>
            <label>Caption <textarea id="galleryCaption" rows="3"></textarea></label>
            <label>Gallery image <input id="galleryImageFile" type="file" accept="image/png,image/jpeg,image/webp" /></label>
            <label>Image URL <input id="galleryImage" placeholder="Optional hosted image URL" /></label>
            <div class="image-preview hidden" id="galleryImagePreview"><img src="" alt="" /></div>
            <label>Sort order <input id="gallerySort" type="number" value="0" /></label>
            <label class="check-row"><input id="galleryActive" type="checkbox" checked /> Active</label>
            <button type="submit">Save gallery image</button>
            <button class="ghost-button" id="galleryReset" type="button">Clear</button>
          </form>
          <div class="admin-list" id="adminGalleryList"></div>
        </div>

        <div class="admin-panel hidden" data-panel="promos">
          <form id="promoForm" class="admin-form compact-form">
            <input type="hidden" id="promoId" />
            <label>Code <input id="promoCode" placeholder="OSCO10" required /></label>
            <label>Discount type
              <select id="promoType">
                <option value="percent">Percent</option>
                <option value="fixed">Fixed amount</option>
              </select>
            </label>
            <label>Value <input id="promoValue" type="number" min="1" required /></label>
            <label>Minimum order (GHS) <input id="promoMinOrder" type="number" min="0" value="0" /></label>
            <label class="check-row"><input id="promoActive" type="checkbox" checked /> Active</label>
            <button type="submit">Save promo code</button>
            <button class="ghost-button" id="promoReset" type="button">Clear</button>
          </form>
          <div class="admin-list" id="adminPromoList"></div>
        </div>

        <div class="admin-panel hidden" data-panel="banners">
          <form id="bannerForm" class="admin-form compact-form">
            <input type="hidden" id="bannerId" />
            <label>Placement
              <select id="bannerPlacement">
                <option value="promo">Promo banner</option>
                <option value="notification">Notification</option>
              </select>
            </label>
            <label>Message <input id="bannerText" required /></label>
            <label class="check-row"><input id="bannerActive" type="checkbox" checked /> Active</label>
            <button type="submit">Save banner</button>
            <button class="ghost-button" id="bannerReset" type="button">Clear</button>
          </form>
          <div class="admin-list" id="adminBannerList"></div>
        </div>

        <div class="admin-panel hidden" data-panel="orders">
          <p class="helper">Review paid orders, update fulfillment, and keep customers informed.</p>
          <div class="admin-list" id="adminOrderList"></div>
        </div>

        <div class="admin-panel hidden" data-panel="staff">
          <form id="staffForm" class="admin-form compact-form">
            <label>Full name <input id="staffName" autocomplete="name" required /></label>
            <label>Phone <input id="staffPhone" autocomplete="tel" /></label>
            <label>Email <input id="staffEmail" type="email" autocomplete="email" required /></label>
            <label>Temporary password <input id="staffPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
            <label>Access level
              <select id="staffRole">
                <option value="admin">Owner</option>
                <option value="staff">Staff</option>
              </select>
            </label>
            <button type="submit">Add account</button>
          </form>
          <div class="admin-list" id="adminStaffList"></div>
        </div>
        <p class="helper" id="adminMessage"></p>
      </section>
    </main>
  </body>
</html>
